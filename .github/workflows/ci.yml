name: CI

on:
  
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" 

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t teb:test .

      - name: Verify health check
        run: |
          docker run -d --name teb-test \
            -e TEB_JWT_SECRET=ci-test-secret \
            -p 8000:8000 \
            teb:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop teb-test

      - name: Verify base-path static files load (prevents CSS/JS 404 regression)
        run: |
          docker run -d --name teb-basepath \
            -e TEB_JWT_SECRET=ci-test-secret \
            -e TEB_BASE_PATH=/teb \
            -p 8001:8000 \
            teb:test
          sleep 5
          curl -f http://localhost:8001/health || { echo "FAIL: /health"; docker logs teb-basepath; exit 1; }
          curl -sf http://localhost:8001/teb | grep -q 'style.css' || { echo "FAIL: HTML missing style.css"; exit 1; }
          curl -sf -o /dev/null -w '%{http_code}' http://localhost:8001/teb/static/style.css | grep -q 200 || { echo "FAIL: CSS 404"; exit 1; }
          curl -sf -o /dev/null -w '%{http_code}' http://localhost:8001/teb/static/app.js | grep -q 200 || { echo "FAIL: JS 404"; exit 1; }
          echo "Base-path static files OK"
          docker stop teb-basepath
