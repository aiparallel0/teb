name: Deploy to portearchive.com

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Run tests first — never deploy broken code
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check required secrets
        run: |
          missing=""
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then missing="$missing DEPLOY_HOST"; fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then missing="$missing DEPLOY_USER"; fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then missing="$missing DEPLOY_SSH_KEY"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Configure these secrets in Settings → Secrets → Actions to enable auto-deploy."
            echo "See deploy/README.md for setup instructions."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eo pipefail
            cd /opt/teb

            echo "==> Cleaning local state..."
            git stash --include-untracked 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main

            echo "==> Updating nginx config..."
            sudo cp nginx/teb.conf /etc/nginx/snippets/teb.conf
            sudo nginx -t

            echo "==> Rebuilding and restarting containers..."
            docker compose up -d --build

            echo "==> Reloading nginx..."
            sudo systemctl reload nginx

            echo "==> Verifying health..."
            sleep 5
            curl -sf http://localhost:8000/health | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            ai = d.get('components', {}).get('ai', {})
            print('Status: {}, AI: {}'.format(d['status'], ai.get('provider', 'none')))
            if ai.get('status') == 'unconfigured':
                print('WARNING: AI provider is NOT configured — teb is in template-only mode!')
                print('Set ANTHROPIC_API_KEY or OPENAI_API_KEY in /opt/teb/.env')
            sys.exit(0 if d['status'] in ('healthy', 'degraded') else 1)
            "

            AI_STATUS=$(curl -sf http://localhost:8000/health | python3 -c "import sys, json; print(json.load(sys.stdin).get('ai_active', False))")
            if [ "$AI_STATUS" != "True" ]; then
              echo "::warning::AI provider is NOT configured. teb is running in template-only mode. Set ANTHROPIC_API_KEY or OPENAI_API_KEY in /opt/teb/.env"
            fi

            echo "==> Deploy complete!"
