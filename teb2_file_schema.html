<h2 class="sr-only">teb2 file relationship schema showing modules as clusters with minimal inter-file communication lines</h2>
<style>
svg text { pointer-events: none; }
.node-file { cursor: pointer; }
.node-file:hover rect { opacity: 0.85; }
#tooltip {
  position: absolute; background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  padding: 8px 12px; font-size: 12px; line-height: 1.6;
  color: var(--color-text-primary); pointer-events: none;
  opacity: 0; transition: opacity .15s; max-width: 220px;
}
</style>
<div style="position:relative">
<div id="tooltip"></div>
<svg id="schema" width="100%" viewBox="0 0 680 520" role="img">
<title>teb2 file relationship schema</title>
<desc>Modules shown as labeled clusters. Lines between files represent direct #include relationships only. core/types.h and core/errors.h are the only files included by all modules.</desc>

<script>
const tt = document.getElementById('tooltip');
const svg = document.getElementById('schema');
const nodes = svg.querySelectorAll('.node-file');
nodes.forEach(n => {
  n.addEventListener('mouseenter', e => {
    const tip = n.getAttribute('data-tip');
    if (!tip) return;
    tt.textContent = tip;
    tt.style.opacity = '1';
  });
  n.addEventListener('mousemove', e => {
    const box = svg.getBoundingClientRect();
    const px = e.clientX - box.left;
    const py = e.clientY - box.top;
    tt.style.left = (px + 12) + 'px';
    tt.style.top  = (py + 12) + 'px';
  });
  n.addEventListener('mouseleave', () => { tt.style.opacity = '0'; });
});
</script>
