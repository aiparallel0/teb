# teb reverse proxy — mount at /teb on portearchive.com
# Include this snippet inside the main portearchive.com server block:
#
#   include /etc/nginx/snippets/teb.conf;
#
# Make sure the upstream teb service is running:
#   systemctl start teb

# teb API + frontend
# NOTE: The /teb path here must match the TEB_BASE_PATH env var set in teb's .env

# Redirect bare /teb (no trailing slash) to /teb/ so that the <base href="/teb/">
# in index.html is consistent with the document URL.  Without this redirect,
# fragment links (e.g. href="#/kanban") are resolved by the browser against the
# base URL (/teb/), producing a different path (/teb/ vs /teb) which triggers a
# full page reload on every sidebar click and resets all JavaScript state.
location = /teb {
    return 301 /teb/;
}

location /teb/ {
    proxy_pass http://127.0.0.1:8000/teb/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
}

# teb health check (no prefix) — used by infra monitoring
location = /teb-health {
    proxy_pass http://127.0.0.1:8000/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    access_log off;
}
