<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to Text</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uswds@3/dist/css/uswds.min.css" />
</head>
<body>
  <header class="usa-header usa-header--basic">
    <div class="usa-nav-container">
      <div class="usa-navbar">
        <div class="usa-logo">
          <em class="usa-logo__text">Image to Text</em>
        </div>
        <div class="usa-nav__secondary">
          <button class="usa-button usa-button--outline btn-sm" id="signInBtn" type="button" onclick="window.location.href='login.html'">Sign In</button>
          <button class="usa-button btn-sm" id="registerBtn" type="button" onclick="window.location.href='register.html'">Register</button>
        </div>
      </div>
    </div>
  </header>

  <main class="usa-section">
    <div class="grid-container">
      <div class="grid-row grid-gap">
        <div class="tablet:grid-col-8 tablet:grid-offset-2 text-center">
          <h1 class="font-heading-xl">Extract Text from Images Instantly</h1>
          <p class="font-body-lg usa-intro">
            Upload an image and our AI-powered engine converts it to editable text in seconds.
          </p>
          <div class="margin-top-4">
            <button class="usa-button usa-button--big" type="button" onclick="window.location.href='register.html'">Get Started Free</button>
            <button class="usa-button usa-button--big usa-button--outline margin-left-2" type="button" onclick="window.location.href='login.html'">Sign In</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="usa-footer usa-footer--slim">
    <div class="usa-footer__secondary-section">
      <div class="grid-container">
        <div class="usa-footer__logo grid-row grid-gap-2">
          <p class="usa-footer__logo-heading">Image to Text</p>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
