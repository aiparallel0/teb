services:
  teb:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database outside the container
      - teb-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/teb.db
      - TEB_JWT_SECRET=${TEB_JWT_SECRET:?Set TEB_JWT_SECRET in .env}
      # Base path for reverse-proxy mounting — required for portearchive.com/teb hosting.
      # Set to empty or remove for standalone deployments (app served at /).
      - TEB_BASE_PATH=/teb
      # AI providers — set at least one for AI-powered decomposition and execution.
      # Without these, teb falls back to template mode (no real AI involvement).
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TEB_AI_PROVIDER=${TEB_AI_PROVIDER:-auto}
      # - TEB_CORS_ORIGINS=https://yourdomain.com
    env_file:
      - .env
    restart: unless-stopped

volumes:
  teb-data:
