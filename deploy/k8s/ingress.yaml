apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teb
  labels:
    app: teb
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: teb.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: teb
                port:
                  number: 80
  tls:
    - hosts:
        - teb.example.com
      secretName: teb-tls
