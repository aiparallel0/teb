apiVersion: apps/v1
kind: Deployment
metadata:
  name: teb
  labels:
    app: teb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teb
  template:
    metadata:
      labels:
        app: teb
    spec:
      containers:
        - name: teb
          image: teb:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: teb-config
          env:
            - name: TEB_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: teb-secrets
                  key: jwt-secret
            - name: TEB_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: teb-secrets
                  key: encryption-key
                  optional: true
            - name: TEB_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: teb-secrets
                  key: secret-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
